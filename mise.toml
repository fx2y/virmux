[tools]
go = "1.26.0"
node = "22.17.1"

[env]
MISE_TASK_OUTPUT = "prefix"

[tasks."host:deps"]
description = "Install required Ubuntu host dependencies"
run = "./scripts/host_deps.sh"
sources = ["scripts/host_deps.sh"]
outputs = ["tmp/host-deps.ok"]

[tasks.doctor]
description = "Hard-gate host and runtime prerequisites"
run = "./scripts/doctor.sh"
sources = ["scripts/doctor.sh", "scripts/common.sh"]
outputs = ["tmp/doctor.ok"]

[tasks."doctor:test:missing-artifact"]
description = "Guard: doctor fails when lock-selected rootfs artifact is missing"
depends = ["image:stamp"]
run = "./scripts/test_doctor_missing_artifact.sh"
sources = ["scripts/test_doctor_missing_artifact.sh", "scripts/doctor.sh", "scripts/common.sh", "vm/images.lock", ".cache/ghostfleet/images/*/rootfs.ext4"]
outputs = ["tmp/doctor-missing-artifact.ok"]

[tasks."doctor:test:socket-probe"]
description = "Guard: doctor fails when unix socket cannot be bound"
run = "./scripts/test_doctor_socket_probe.sh"
sources = ["scripts/test_doctor_socket_probe.sh", "scripts/doctor.sh", "scripts/common.sh"]
outputs = ["tmp/doctor-socket-probe.ok"]

[tasks."image:build"]
description = "Build immutable image artifacts into cache by content hash"
run = "./scripts/image_build.sh"
sources = ["scripts/image_build.sh", "scripts/image_build_inner.sh", "scripts/common.sh", "vm/image-src/manifest.json", "cmd/virmux-agentd/**/*.go", "internal/agentd/**/*.go", "internal/transport/**/*.go", "go.mod", "go.sum"]
outputs = [".cache/ghostfleet/images/.manifest-built"]

[tasks."image:seed"]
description = "Seed immutable image cache from local artifact directory (air-gapped path)"
run = "./scripts/image_seed.sh"
sources = ["scripts/image_seed.sh", "scripts/common.sh", "vm/image-src/manifest.json", "scripts/image_build.sh", "scripts/image_build_inner.sh", "cmd/virmux-agentd/**/*.go", "internal/agentd/**/*.go", "internal/transport/**/*.go", "go.mod", "go.sum"]
outputs = [".cache/ghostfleet/images/.manifest-built"]

[tasks."image:test:checksum-mismatch"]
description = "Guard: image build hard-fails when pinned source checksums mismatch"
run = "./scripts/test_image_checksum_mismatch.sh"
sources = ["scripts/test_image_checksum_mismatch.sh", "scripts/image_build_inner.sh", "scripts/common.sh", "vm/image-src/manifest.json"]
outputs = ["tmp/image-checksum-mismatch.ok"]

[tasks."image:test:sha-stability"]
description = "Guard: calc_image_sha is deterministic across repeated evaluation"
run = "./scripts/test_calc_image_sha_stability.sh"
sources = ["scripts/test_calc_image_sha_stability.sh", "scripts/common.sh", "scripts/image_build.sh", "scripts/image_build_inner.sh", "vm/image-src/manifest.json", "cmd/virmux-agentd/**/*.go", "internal/agentd/**/*.go", "internal/transport/**/*.go", "go.mod", "go.sum"]
outputs = ["tmp/image-sha-stability.ok"]

[tasks."image:test:lock-recovery"]
description = "Guard: stale image build lock from killed process auto-recovers"
run = "./scripts/test_image_build_lock_recovery.sh"
sources = ["scripts/test_image_build_lock_recovery.sh", "scripts/image_build.sh", "scripts/common.sh"]
outputs = ["tmp/image-build-lock-recovery.ok"]

[tasks."image:test:seed"]
description = "Guard: image:seed copies local artifacts into deterministic cache layout"
run = "./scripts/test_image_seed.sh"
sources = ["scripts/test_image_seed.sh", "scripts/image_seed.sh", "scripts/image_build.sh", "scripts/common.sh", "vm/image-src/manifest.json", "cmd/virmux-agentd/**/*.go", "internal/agentd/**/*.go", "internal/transport/**/*.go", "go.mod", "go.sum"]
outputs = ["tmp/image-seed.ok"]

[tasks."image:stamp"]
description = "Write vm/images.lock from current content hash"
depends = ["image:build"]
run = [
  "./scripts/image_stamp.sh"
]
sources = ["scripts/image_stamp.sh", "scripts/common.sh", "vm/image-src/manifest.json", "cmd/virmux-agentd/**/*.go", "internal/agentd/**/*.go", "internal/transport/**/*.go", "go.mod", "go.sum"]
outputs = ["vm/images.lock", ".cache/ghostfleet/images/.manifest-built"]

[tasks."vm:smoke"]
description = "Boot a microVM, run uname/echo smoke path, persist trace+sqlite"
depends = ["doctor", "image:stamp"]
run = "./scripts/vm_smoke.sh"
sources = ["scripts/vm_smoke.sh", "scripts/common.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["runs/.last-smoke", "runs/virmux.sqlite"]

[tasks."vm:smoke:parallel"]
description = "Run multiple smoke instances concurrently"
depends = ["doctor", "image:stamp"]
run = "MISE_JOBS=${MISE_JOBS:-$(nproc)} ./scripts/vm_smoke_parallel.sh"
sources = ["scripts/vm_smoke_parallel.sh", "scripts/vm_smoke.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["runs/.last-smoke-parallel", "runs/virmux.sqlite"]

[tasks."vm:boot:contract"]
description = "Uncached boot telemetry gate: fifo drains + guest-ready boundary + lost counters"
depends = ["doctor", "image:stamp"]
run = "./scripts/vm_boot_contract.sh"
sources = ["scripts/vm_boot_contract.sh", "scripts/vm_smoke.sh", "scripts/common.sh", "scripts/doctor.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["tmp/vm-boot-contract.ok", "tmp/vm-boot-contract.json", "runs/virmux.sqlite"]

[tasks."vm:vsock:chaos"]
description = "C2 gate: vsock CONNECT race retry + handshake telemetry contract"
depends = ["doctor", "image:stamp"]
run = "./scripts/vm_vsock_chaos.sh"
sources = ["scripts/vm_vsock_chaos.sh", "scripts/common.sh", "scripts/doctor.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["tmp/vm-vsock-chaos.ok", "tmp/vsock-chaos-report.json", "runs/virmux.sqlite"]

[tasks."vm:test:tool-shell"]
description = "C3 gate: vm agentd shell.exec over vsock returns deterministic result"
depends = ["doctor", "image:stamp"]
run = "./scripts/vm_test_tool_shell.sh"
sources = ["scripts/vm_test_tool_shell.sh", "scripts/common.sh", "scripts/doctor.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["tmp/vm-test-tool-shell.ok", "runs/virmux.sqlite"]

[tasks."vm:test:tool-fs"]
description = "C3 gate: vm agentd fs.read/fs.write roundtrip under /data"
depends = ["doctor", "image:stamp"]
run = "./scripts/vm_test_tool_fs.sh"
sources = ["scripts/vm_test_tool_fs.sh", "scripts/common.sh", "scripts/doctor.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["tmp/vm-test-tool-fs.ok", "runs/virmux.sqlite"]

[tasks."vm:test:tool-http"]
description = "C3 gate: http tool contract + timeout typed error (tool runtime guards)"
run = "./scripts/vm_test_tool_http.sh"
sources = ["scripts/vm_test_tool_http.sh", "internal/agentd/**/*.go"]
outputs = ["tmp/vm-test-tool-http.ok"]

[tasks."vm:test:no-leak"]
description = "C3 gate: deny writes outside /data"
depends = ["doctor", "image:stamp"]
run = "./scripts/vm_test_no_leak.sh"
sources = ["scripts/vm_test_no_leak.sh", "scripts/common.sh", "scripts/doctor.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["tmp/vm-test-no-leak.ok", "runs/virmux.sqlite"]

[tasks."vm:test:export-roundtrip"]
description = "C4 gate: deterministic export/import roundtrip bundle"
run = "./scripts/vm_test_export_roundtrip.sh"
sources = ["scripts/vm_test_export_roundtrip.sh", "cmd/**/*.go", "internal/**/*.go"]
outputs = ["tmp/vm-test-export-roundtrip.ok"]

[tasks."vm:test:watchdog"]
description = "C5 gate: watchdog kill-path emits event and returns without hang (unit contract)"
run = "./scripts/vm_test_watchdog.sh"
sources = ["scripts/vm_test_watchdog.sh", "internal/**/*.go"]
outputs = ["tmp/vm-test-watchdog.ok"]

[tasks."vm:test:crash-partial-export"]
description = "C5 gate: failed-run taxonomy + partial export metadata/event/artifact contract"
run = "./scripts/vm_test_crash_partial_export.sh"
sources = ["scripts/vm_test_crash_partial_export.sh", "cmd/**/*.go", "internal/**/*.go"]
outputs = ["tmp/vm-test-crash-partial-export.ok"]

[tasks."vm:zygote"]
description = "Create pause snapshot for zygote-style resumes"
depends = ["doctor", "image:stamp"]
run = "./scripts/vm_zygote.sh"
sources = ["scripts/vm_zygote.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["runs/.last-zygote"]

[tasks."vm:resume"]
description = "Resume VM from latest snapshot and run quick command"
depends = ["doctor", "image:stamp", "vm:zygote"]
run = "./scripts/vm_resume.sh"
sources = ["scripts/vm_resume.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["runs/.last-resume", "runs/virmux.sqlite"]

[tasks."vm:test:resume-fallback-nosnap"]
description = "Guard: vm-resume falls back to cold boot when snapshot metadata is missing"
depends = ["doctor", "image:stamp"]
run = "./scripts/test_vm_resume_fallback_no_snapshot.sh"
sources = ["scripts/test_vm_resume_fallback_no_snapshot.sh", "scripts/common.sh", "scripts/doctor.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["tmp/vm-resume-fallback-nosnap.ok", "runs/virmux.sqlite"]

[tasks."vm:test:resume-snapshot-success"]
description = "Guard: vm-resume succeeds in snapshot mode after zygote"
depends = ["doctor", "image:stamp"]
run = "./scripts/test_vm_resume_snapshot_success.sh"
sources = ["scripts/test_vm_resume_snapshot_success.sh", "scripts/common.sh", "scripts/doctor.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["tmp/vm-resume-snapshot-success.ok", "runs/virmux.sqlite"]

[tasks."vm:test:agent-persistence"]
description = "Guard: per-agent data volume persists and isolates across runs"
depends = ["doctor", "image:stamp"]
run = "./scripts/test_vm_agent_persistence.sh"
sources = ["scripts/test_vm_agent_persistence.sh", "scripts/common.sh", "scripts/doctor.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["tmp/vm-agent-persistence.ok", "runs/virmux.sqlite", "agents/A.json", "volumes/A.ext4"]

[tasks."bench:snapshot"]
description = "Measure snapshot resume latency repeatedly"
depends = ["vm:zygote"]
run = "./scripts/bench_snapshot.sh"
sources = ["scripts/bench_snapshot.sh", "scripts/vm_resume.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["runs/.last-bench-snapshot", "runs/bench-snapshot-summary.json", "runs/virmux.sqlite"]

[tasks."vm:net:probe"]
description = "Optional tap network probe lane (non-blocking; emits skip when unprivileged)"
depends = ["doctor", "image:stamp"]
run = "./scripts/vm_net_probe.sh"
sources = ["scripts/vm_net_probe.sh", "scripts/common.sh", "scripts/doctor.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock"]
outputs = ["runs/.last-vm-net-probe"]

[tasks."vm:cleanup:audit"]
description = "Guard: no orphan firecracker process/socket/vsock/fifo/tap leftovers after VM tasks"
run = "./scripts/cleanup_audit.sh"
sources = ["scripts/cleanup_audit.sh", "scripts/common.sh", "runs/.last-smoke-parallel", "runs/**/*"]
outputs = ["tmp/cleanup-audit.ok", "tmp/cleanup-audit.log"]

[tasks."trace:validate"]
description = "Validate trace JSONL schema contract"
run = "./scripts/trace_validate.sh"
sources = ["scripts/trace_validate.sh", "runs/*/trace.ndjson", "runs/*/trace.jsonl"]
outputs = ["runs/.trace-validate.ok"]

[tasks."db:check"]
description = "Validate sqlite WAL/FK/index invariants"
run = "./scripts/db_check.sh"
sources = ["scripts/db_check.sh", "runs/virmux.sqlite"]
outputs = ["runs/.db-check.ok"]

[tasks."qa:sql-contract"]
description = "Cohort-scoped SQL contract checks for vm:resume telemetry keys"
run = "./scripts/sql_cert_contract.sh"
sources = ["scripts/sql_cert_contract.sh", "scripts/common.sh", "runs/virmux.sqlite"]
outputs = ["tmp/qa-sql-contract.ok"]

[tasks."pw:install"]
description = "Install node deps and Playwright browsers with cache"
run = "./scripts/pw_install.sh"
sources = ["package.json", "package-lock.json", "scripts/pw_install.sh"]
outputs = [".cache/ms-playwright/.install-stamp", "node_modules/.package-lock.json", "tmp/pw-install-status.json"]

[tasks."pw:install:status"]
description = "Guard: pw:install writes structured install/audit status"
depends = ["pw:install"]
run = "./scripts/test_pw_install_status.sh"
sources = ["scripts/test_pw_install_status.sh", "tmp/pw-install-status.json"]
outputs = ["tmp/pw-install-status.ok"]

[tasks."pw:smoke"]
description = "Host-side Playwright chromium smoke"
depends = ["pw:install"]
run = "./scripts/pw_smoke.sh"
sources = ["scripts/pw_smoke.sh", "scripts/pw_smoke.mjs", "package.json"]
outputs = ["tmp/pw-smoke.ok"]

[tasks."slack:fixture"]
description = "Generate canonical Slack fixtures"
run = "./scripts/slack_fixture.sh"
sources = ["scripts/slack_fixture.sh"]
outputs = ["fixtures/slack/url_verification.json", "fixtures/slack/message_event.json", "fixtures/slack/.fixture-stamp"]

[tasks."slack:recv"]
description = "Run local Slack receiver and replay fixtures"
depends = ["slack:fixture"]
run = "./scripts/slack_recv.sh"
sources = ["scripts/slack_recv.sh", "fixtures/slack/*.json", "cmd/**/*.go", "internal/**/*.go"]
outputs = ["tmp/slack-server.log", "runs/virmux.sqlite"]

[tasks."ship:core"]
description = "Uncached core certification lane (runtime execution + fresh-run assertion)"
run = "./scripts/ship_core.sh"
sources = ["scripts/ship_core.sh", "scripts/common.sh", "scripts/doctor.sh", "scripts/test_doctor_missing_artifact.sh", "scripts/test_doctor_socket_probe.sh", "scripts/test_image_checksum_mismatch.sh", "scripts/vm_boot_contract.sh", "scripts/vm_vsock_chaos.sh", "scripts/vm_smoke.sh", "scripts/vm_zygote.sh", "scripts/vm_resume.sh", "scripts/test_vm_agent_persistence.sh", "scripts/test_vm_resume_fallback_no_snapshot.sh", "scripts/test_vm_resume_snapshot_success.sh", "scripts/bench_snapshot.sh", "scripts/trace_validate.sh", "scripts/db_check.sh", "scripts/sql_cert_contract.sh", "scripts/cleanup_audit.sh", "scripts/vm_test_export_roundtrip.sh", "scripts/vm_test_watchdog.sh", "scripts/vm_test_crash_partial_export.sh", "cmd/**/*.go", "internal/**/*.go", "vm/images.lock", "docs/**/*.md"]
outputs = ["tmp/ship-core-summary.json", "tmp/cleanup-audit.ok", "tmp/vm-test-watchdog.ok", "tmp/vm-test-crash-partial-export.ok", "runs/bench-snapshot-summary.json", "runs/virmux.sqlite"]

[tasks."skill:lint"]
description = "Lint canonical skill artifacts (C1)"
run = ["go run ./cmd/virmux skill lint skills/dd >/dev/null", "mkdir -p tmp && date -u +%FT%TZ > tmp/skill-lint.ok"]
sources = ["cmd/**/*.go", "internal/skill/**/*.go", "skills/**/*.md", "skills/**/*.yaml", "skills/**/*.json"]
outputs = ["tmp/skill-lint.ok"]

[tasks."skill:test:core"]
description = "Focused C1 skill-core guards"
run = "./scripts/skill_test_core.sh"
sources = ["scripts/skill_test_core.sh", "cmd/**/*.go", "internal/**/*.go", "skills/**/*.md", "skills/**/*.yaml", "skills/**/*.json"]
outputs = ["tmp/skill-test-core.ok"]

[tasks.fmt]
description = "Format Go and JS"
run = ["gofmt -w $(find cmd internal -name '*.go')", "npx prettier --write scripts/pw_smoke.mjs", "mkdir -p tmp && date -u +%Y-%m-%dT%H:%M:%SZ > tmp/fmt.ok"]
sources = ["cmd/**/*.go", "internal/**/*.go", "scripts/pw_smoke.mjs"]
outputs = ["tmp/fmt.ok"]

[tasks.lint]
description = "Static checks"
run = ["go vet ./cmd/... ./internal/...", "date -u +%Y-%m-%dT%H:%M:%SZ > tmp/lint.ok"]
sources = ["cmd/**/*.go", "internal/**/*.go", "scripts/pw_smoke.mjs"]
outputs = ["tmp/lint.ok"]

[tasks."test:unit"]
description = "Unit test suite"
run = ["go test ./cmd/... ./internal/...", "date -u +%Y-%m-%dT%H:%M:%SZ > tmp/test-unit.ok"]
sources = ["cmd/**/*.go", "internal/**/*.go"]
outputs = ["tmp/test-unit.ok"]

[tasks."ci:fast"]
description = "Fast local loop: fmt/lint/unit in parallel"
run = "mise run fmt ::: lint ::: test:unit"
